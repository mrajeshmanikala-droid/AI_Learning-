<div class="flex h-screen overflow-hidden bg-surface">
  <!-- Sidebar -->
  <aside class="w-72 bg-surface-container-low flex flex-col justify-between py-10 px-8">
    <div>
      <div class="flex items-center gap-3 mb-16">
        <div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center text-white font-bold">A</div>
        <span class="text-on-surface font-headline font-bold">Admin Console</span>
      </div>
      <nav class="space-y-4">
        <a routerLink="/admin/manage-courses" class="flex items-center gap-4 text-on-surface-variant font-body text-sm hover:text-primary transition-colors">
          <span class="material-symbols-outlined text-sm">arrow_back</span> Back to Library
        </a>
      </nav>
    </div>
  </aside>

  <!-- Content Window -->
  <main class="flex-1 overflow-y-auto p-12">
    <div class="max-w-4xl mx-auto">
      <header class="mb-12">
        <div class="flex items-center gap-2 mb-2">
            <span class="text-[10px] font-bold text-primary uppercase bg-primary-container/10 px-2 py-0.5 rounded-full">EDITING MODE</span>
            <span class="text-[10px] font-bold text-on-surface-variant uppercase">REF: #{{courseId}}</span>
        </div>
        <h1 class="text-3xl font-headline font-bold text-on-surface mb-2">Refine Curriculum</h1>
        <p class="text-on-surface-variant font-body">Updating the structure or content of an existing course.</p>
      </header>

      @if (isLoading) {
        <div class="flex items-center justify-center h-64">
          <div class="w-8 h-8 border-4 border-primary/30 border-t-primary rounded-full animate-spin"></div>
        </div>
      } @else {
        <form (ngSubmit)="onSubmit()" class="space-y-12">
            <!-- Section 1: Course Identity -->
            <section class="bg-surface-container-low p-8 rounded-2xl relative">
              <div class="absolute -left-3 top-8 w-1 h-8 bg-primary rounded-full"></div>
              <h2 class="text-xs font-bold text-primary uppercase tracking-widest mb-8">Part I: Course Identity</h2>
              
              <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="space-y-2">
                  <label class="text-xs font-bold text-on-surface-variant uppercase">Course Title</label>
                  <input type="text" [(ngModel)]="title" name="courseTitle" required class="w-full bg-white p-3 rounded-lg border-b-2 border-transparent focus:border-primary outline-none transition-all font-body text-on-surface" placeholder="e.g. Advanced Golang Patterns">
                </div>
                <div class="space-y-2">
                  <label class="text-xs font-bold text-on-surface-variant uppercase">Modules Count</label>
                  <input type="number" [(ngModel)]="modulesCount" name="modulesCount" class="w-full bg-white p-3 rounded-lg border-b-2 border-transparent focus:border-primary outline-none transition-all font-body text-on-surface">
                </div>
                <div class="md:col-span-2 space-y-2">
                  <label class="text-xs font-bold text-on-surface-variant uppercase">Description</label>
                  <textarea [(ngModel)]="description" name="courseDesc" rows="3" class="w-full bg-white p-3 rounded-lg border-b-2 border-transparent focus:border-primary outline-none transition-all font-body text-on-surface" placeholder="What will the students learn?"></textarea>
                </div>
                <div class="md:col-span-2 space-y-2">
                  <label class="text-xs font-bold text-on-surface-variant uppercase">Cover Image URL</label>
                  <input type="text" [(ngModel)]="image" name="courseImage" class="w-full bg-white p-3 rounded-lg border-b-2 border-transparent focus:border-primary outline-none transition-all font-body text-on-surface">
                </div>
              </div>
            </section>
    
            <!-- Section 2: Lesson Management -->
            <section class="space-y-6">
              <div class="flex justify-between items-center mb-8">
                <h2 class="text-xs font-bold text-primary uppercase tracking-widest">Part II: Lesson Management</h2>
                <button type="button" (click)="addLesson()" class="text-xs font-bold bg-primary/10 text-primary px-4 py-2 rounded-full hover:bg-primary/20 transition-all flex items-center gap-2">
                  <span class="material-symbols-outlined text-sm">add</span> Add New Lesson
                </button>
              </div>
    
              @for (lesson of lessons; track $index) {
                <div class="bg-surface-container-lowest p-6 rounded-xl border border-outline-variant/10 shadow-sm relative group">
                  <div class="grid grid-cols-1 md:grid-cols-12 gap-4">
                    <div class="md:col-span-4 space-y-2">
                      <label class="text-[10px] font-bold text-on-surface-variant uppercase">Lesson Title</label>
                      <input type="text" [(ngModel)]="lesson.title" [name]="'lt'+$index" required class="w-full bg-surface-container-low p-2 rounded-md outline-none focus:bg-white transition-all text-sm font-body">
                    </div>
                    <div class="md:col-span-3 space-y-2">
                      <label class="text-[10px] font-bold text-on-surface-variant uppercase">YouTube Link</label>
                      <input type="text" [(ngModel)]="lesson.videoUrl" [name]="'lv'+$index" required placeholder="https://youtube.com/watch?v=..." class="w-full bg-surface-container-low p-2 rounded-md outline-none focus:bg-white transition-all text-sm font-body">
                    </div>
                    <div class="md:col-span-3 space-y-2">
                      <label class="text-[10px] font-bold text-on-surface-variant uppercase">Module Name</label>
                      <input type="text" [(ngModel)]="lesson.module" [name]="'lm'+$index" required class="w-full bg-surface-container-low p-2 rounded-md outline-none focus:bg-white transition-all text-sm font-body">
                    </div>
                    <div class="md:col-span-2 space-y-2">
                      <label class="text-[10px] font-bold text-on-surface-variant uppercase">Duration</label>
                      <input type="text" [(ngModel)]="lesson.duration" [name]="'ld'+$index" class="w-full bg-surface-container-low p-2 rounded-md outline-none focus:bg-white transition-all text-sm font-body">
                    </div>
                    <div class="md:col-span-12 space-y-2">
                      <label class="text-[10px] font-bold text-on-surface-variant uppercase">Lesson Description</label>
                      <input type="text" [(ngModel)]="lesson.description" [name]="'lds'+$index" class="w-full bg-surface-container-low p-2 rounded-md outline-none focus:bg-white transition-all text-sm font-body">
                    </div>
                  </div>
                  
                  <button type="button" (click)="removeLesson($index)" class="absolute top-2 right-2 text-on-surface-variant hover:text-error transition-all">
                    <span class="material-symbols-outlined text-sm">delete</span>
                  </button>
                </div>
              }
            </section>
    
            <!-- Final Action -->
            <div class="pt-12 border-t border-outline-variant/10 flex justify-end gap-4">
              <button type="button" routerLink="/admin/manage-courses" class="px-8 py-3 rounded-lg text-on-surface-variant font-bold hover:bg-surface-container-low transition-all">Cancel</button>
              <button type="submit" [disabled]="isSubmitting" class="px-12 py-3 rounded-lg bg-primary text-white font-bold shadow-xl shadow-primary/20 hover:scale-105 active:scale-95 transition-all flex items-center gap-3">
                @if (isSubmitting) {
                  <div class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
                }
                Save Changes
              </button>
            </div>
          </form>
      }
    </div>
  </main>
</div>
